<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布线报</title>
    <link href="https://lib.baomitu.com/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/@wangeditor/editor@latest/dist/css/style.css" rel="stylesheet">

    <style>
        :root {
            --ios-blue: #007aff;
            --bg-color: #f7f8fa;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, sans-serif;
            padding-bottom: 50px;
        }

        .main-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .publish-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            padding: 20px;
            border: none;
        }

        .title-input {
            border: none;
            border-bottom: 1px solid #eee;
            border-radius: 0;
            padding: 15px 0;
            font-size: 1.25rem;
            font-weight: bold;
            box-shadow: none !important;
        }

        .title-input:focus {
            border-bottom-color: var(--ios-blue);
        }

        .editor-box {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #editor-toolbar {
            border-bottom: 1px solid #f1f1f1;
            background-color: #fafafa;
        }

        #editor-content {
            min-height: 350px;
        }

        /* 限制图片显示大小，防止撑爆屏幕 */
        #editor-content img {
            max-width: 80%;
            max-height: 400px;
            border-radius: 8px;
            margin: 10px 0;
            display: block;
            border: 1px solid #f0f0f0;
        }

        @media (max-width: 768px) {
            #editor-content img {
                max-width: 100%;
            }
        }

        .select-btn {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            border: 1px solid #eee;
            color: #555;
            width: 100%;
            transition: 0.2s;
        }

        .btn-check:checked+.btn-outline-primary {
            background-color: #eaf2ff;
            color: #007aff;
            border-color: #007aff;
        }

        .btn-check:checked+.btn-outline-danger {
            background-color: #fff0f0;
            color: #dc3545;
            border-color: #dc3545;
        }

        .btn-publish {
            background-color: var(--ios-blue);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .btn-publish:hover {
            background-color: #0066d6;
        }

        .toast-custom {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <div class="main-container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0 fw-bold">发布新线报</h4>
            <a href="/" class="btn btn-light btn-sm rounded-pill px-3">返回</a>
        </div>

        <form action="/publish" method="POST" id="publishForm">
            <div class="publish-card">
                <div class="mb-3">
                    <input type="text" name="title" class="form-control title-input" placeholder="请输入标题..." required>
                </div>

                <div class="editor-box">
                    <div id="editor-toolbar"></div>
                    <div id="editor-content"></div>
                </div>
                <textarea name="content" id="hiddenContent" style="display:none;"></textarea>

                <label class="form-label fw-bold text-muted small mb-2">发布选项</label>
                <div class="row g-3">
                    <div class="col-6">
                        <input type="radio" class="btn-check" name="publish_mode" id="modeNormal" value="normal"
                            checked>
                        <label class="btn select-btn btn-outline-primary" for="modeNormal">🐑 羊毛精选</label>
                    </div>
                    <div class="col-6">
                        <input type="radio" class="btn-check" name="publish_mode" id="modeTop" value="top">
                        <label class="btn select-btn btn-outline-danger" for="modeTop">🔥 首页置顶</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-publish" id="submitBtn">立即发布</button>
            </div>
        </form>
    </div>

    <!-- 提示框 -->
    <div class="toast-container toast-custom">
        <div id="imgToast" class="toast align-items-center text-white bg-primary border-0 shadow" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">正在处理图片...</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@wangeditor/editor@latest/dist/index.js"></script>
    <script src="https://lib.baomitu.com/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

    <script>
        const { createEditor, createToolbar } = window.wangEditor;
        const toastEl = document.getElementById('imgToast');
        const toastBody = toastEl.querySelector('.toast-body');
        const toast = new bootstrap.Toast(toastEl);

        // === 图片压缩功能：核心代码 ===
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // 限制最大宽高为 1500px，保持比例
                        let w = img.width, h = img.height;
                        const maxSize = 1500;
                        if (w > h && w > maxSize) { h *= maxSize / w; w = maxSize; }
                        else if (h > w && h > maxSize) { w *= maxSize / h; h = maxSize; }

                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);

                        // 压缩为 JPEG，质量 0.6 (体积大幅减小)
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        // 编辑器配置
        const editorConfig = {
            placeholder: '在此输入内容，截图直接粘贴 (会自动压缩)...',
            onChange(editor) { document.getElementById('hiddenContent').value = editor.getHtml(); },
            MENU_CONF: {
                // 接管图片上传逻辑
                'uploadImage': {
                    customUpload: async function (file, insertFn) {
                        toastEl.className = "toast align-items-center text-white bg-primary border-0 shadow";
                        toastBody.innerText = "🔄 正在压缩图片...";
                        toast.show();
                        try {
                            const base64 = await compressImage(file);
                            insertFn(base64); // 插入压缩后的图片
                            toastEl.className = "toast align-items-center text-white bg-success border-0 shadow";
                            toastBody.innerText = "✅ 图片压缩成功！";
                        } catch (e) {
                            alert("图片处理失败");
                        }
                    }
                }
            }
        };

        const editor = createEditor({
            selector: '#editor-content', config: editorConfig, mode: 'simple'
        });
        const toolbar = createToolbar({
            editor, selector: '#editor-toolbar',
            config: { toolbarKeys: ['headerSelect', 'bold', 'color', '|', 'uploadImage', 'bulletedList', 'clearStyle'] },
            mode: 'simple'
        });

        // 提交校验
        document.getElementById('publishForm').onsubmit = function () {
            const content = editor.getHtml();
            if (content === '<p><br></p>' || content.trim() === '') { alert('内容不能为空'); return false; }
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 正在上传...';
            btn.disabled = true;
            document.getElementById('hiddenContent').value = content;
            return true;
        };
    </script>
</body>

</html>
